runner:
  command: ["go", "run", "./cmd/ait"]
  workdir: "."
  env:
    # OPENAI_API_KEY: "sk-xxx"
    # OPENAI_BASE_URL: "https://api.openai.com/v1"
  report_pattern: "ait-report-*.json"

history:
  output: "benchmark_history.csv"
  state_file: ".ait_report_ingest_state.json"
  fields:
    - timestamp
    - model
    - protocol
    - base_url
    - target_ip
    - total_requests
    - concurrency
    - is_stream
    - is_thinking
    - success_rate
    - error_rate
    - avg_total_time
    - avg_ttft
    - avg_tpot
    - avg_tps
    - avg_total_throughput_tps
    - system_output_tps
    - system_total_tps
    - total_output_tokens

# Option A: explicit jobs list
jobs:
  - model: "deepseekv3_2"
    concurrency: 1
    count: 5
    # 下面这些字段与 AIT 参数一一对应
    # models: "deepseekv3_2,another_model"
    # version: false
    protocol: "openai"
    base_url: "http://127.0.0.1:38077/v1"
    api_key: "dummy"
    stream: true
    thinking: false
    report: true
    log: false
    timeout: 300
    # prompt: "请总结下面内容"
    # 三种写法都支持：
    # 1) 单文件: "prompts/case1.txt"
    # 2) 通配符: "prompts/*.txt"
    # 3) 目录: "prompts"  (会自动转换为 prompts/*.txt)
    prompt_file: "prompts"
    # prompt_length: 100
    interval_report: 60
    max_tokens: 512
    temperature: 0.7
    top_p: 0.9
    top_k: 50
    # 透传任意 AIT 参数（支持未来新增参数）
    # args:
    #   stream: true
    #   prompt-file: "prompts/*.txt"
    #   max-tokens: 1024

  - model: "deepseekv3_2"
    concurrency: 2
    count: 10
    protocol: "openai"
    base_url: "http://127.0.0.1:38077/v1"
    api_key: "dummy"
    stream: true
    thinking: false
    timeout: 300
    prompt-file: "prompts/*.txt"

